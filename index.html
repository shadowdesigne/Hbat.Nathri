<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>حبة نثري | مطعم ومطبخ</title>
    <meta name="description" content="حبة نثري - مطعم ومطبخ، طلبات التوصيل، حجوزات الولائم والمناسبات">
    <meta property="og:title" content="حبة نثري | مطعم ومطبخ" />
    <meta property="og:url" content="" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="icon.png" />
    <link rel="icon" type="image/png" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png">

    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">

    <style>
        *, *::before, *::after {
            margin: 0; padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'Tajawal', sans-serif;
            background: #1a1f2e;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .wrapper {
            max-width: 680px;
            margin: 0 auto;
            padding: 0 16px 60px;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 32px 0 24px;
        }

        .logo-wrap {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .logo {
            max-width: 160px;
            height: auto;
            border-radius: 50%;
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.2));
        }

        .brand-title {
            font-size: 22px;
            font-weight: 900;
            color: #fff;
            text-align: center;
            letter-spacing: 1px;
        }

        .brand-sub {
            font-size: 14px;
            font-weight: 500;
            color: rgba(255,255,255,0.7);
            text-align: center;
        }

        /* ===== BUTTONS ===== */
        .links-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-top: 10px;
        }

        .link-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            width: 100%;
            padding: 18px 24px;
            border-radius: 16px;
            font-family: 'Tajawal', sans-serif;
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            text-decoration: none;
            cursor: pointer;
            border: none;
            transition: transform 0.18s ease, box-shadow 0.18s ease, filter 0.18s ease;
            position: relative;
            overflow: hidden;
            text-align: center;
        }

        .link-btn:hover {
            transform: translateY(-2px) scale(1.01);
            filter: brightness(1.1);
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
        }

        .link-btn:active {
            transform: scale(0.97);
        }

        .link-btn .btn-icon {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 28px;
            height: 28px;
            flex-shrink: 0;
        }

        .link-btn .btn-icon svg {
            width: 26px;
            height: 26px;
            fill: none;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        .link-btn .btn-icon svg.fill-icon {
            fill: currentColor;
            stroke: none;
        }

        .link-btn span {
            flex: 1;
        }

        /* === COLORS matching the image === */

        /* موقع النقرة - gradient green to yellow */
        .btn-location-1 {
            background: linear-gradient(to left, #f9c400, #4caf50);
            box-shadow: 0 4px 20px rgba(76,175,80,0.4);
        }

        /* طلبات التوصيل - solid green */
        .btn-delivery {
            background: linear-gradient(to left, #2ecc40, #27ae60);
            box-shadow: 0 4px 20px rgba(46,204,64,0.4);
        }

        /* موقع الشفا - gradient green to yellow */
        .btn-location-2 {
            background: linear-gradient(to left, #f9c400, #4caf50);
            box-shadow: 0 4px 20px rgba(76,175,80,0.4);
        }

        /* حجوزات الولائم - orange/gold */
        .btn-reservations {
            background: linear-gradient(to left, #f39c12, #e67e22);
            box-shadow: 0 4px 20px rgba(243,156,18,0.4);
        }

        /* سناب شات - yellow */
        .btn-snapchat {
            background: #FFFC00;
            color: #000;
            box-shadow: 0 4px 20px rgba(255,252,0,0.4);
        }

        .btn-snapchat .btn-icon svg {
            stroke: #000;
        }

        /* تيك توك - gradient pink to cyan */
        .btn-tiktok {
            background: linear-gradient(to left, #00f2ea, #ff0050, #000000);
            background: linear-gradient(135deg, #010101 0%, #ff0050 50%, #00f2ea 100%);
            box-shadow: 0 4px 20px rgba(255,0,80,0.4);
        }

        /* انستقرام - purple to orange */
        .btn-instagram {
            background: linear-gradient(135deg, #405de6 0%, #833ab4 25%, #c13584 50%, #e1306c 75%, #fd1d1d 90%, #f77737 100%);
            box-shadow: 0 4px 20px rgba(193,53,132,0.4);
        }

        /* تويتر/X - blue to cyan */
        .btn-twitter {
            background: linear-gradient(to left, #00acee, #1DA1F2);
            box-shadow: 0 4px 20px rgba(29,161,242,0.4);
        }

        /* يوتيوب - red */
        .btn-youtube {
            background: linear-gradient(to left, #ff0000, #cc0000);
            box-shadow: 0 4px 20px rgba(255,0,0,0.4);
        }

        /* ===== FOOTER ===== */
        footer {
            text-align: center;
            margin-top: 30px;
            font-size: 13px;
            color: rgba(255,255,255,0.35);
        }
    </style>
</head>
